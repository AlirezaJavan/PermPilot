name: CI

on:
  pull_request:
    branches: [ "**" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build, lint, and test (all modules, both platforms)
        run: ./gradlew build --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 7

  ios-simulator-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run iOS simulator tests
        run: ./gradlew :permpilot-core:iosSimulatorArm64Test --stacktrace

      - name: Upload iOS test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-reports
          path: |
            permpilot-core/build/reports/tests/
            permpilot-core/build/test-results/
          retention-days: 7
